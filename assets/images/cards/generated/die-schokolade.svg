  <title id="title">die Schokolade vocabulary card</title>
  <desc id="desc">A German vocabulary card for die Schokolade, meaning chocolate.</desc>
  <rect x="10" y="10" width="340" height="460" rx="24" fill="#FFFDF7" stroke="#263238" stroke-width="8"/>
  <rect x="230" y="24" width="106" height="34" rx="17" fill="#E8F1F2" stroke="#D7E0DF" stroke-width="3"/>
  <text x="283" y="47" text-anchor="middle" fill="#2F6F6D" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="900">NOUN</text>
  <rect x="24" y="24" width="72" height="42" rx="21" fill="#F9C74F" stroke="#263238" stroke-width="5"/><text x="60" y="53" text-anchor="middle" fill="#263238" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="900">die</text>
  
  <circle cx="180" cy="210" r="98" fill="#E8F1F2" stroke="#263238" stroke-width="7"/>
